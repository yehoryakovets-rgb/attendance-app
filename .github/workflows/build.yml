name: Build Apps

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]      # pushing a version tag (e.g. v1.0.0) publishes a Release
  workflow_dispatch:    # allows manual trigger from GitHub UI

permissions:
  contents: write       # needed so the workflow can create a Release

jobs:
  build:
    name: Build Mac app
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac app
        run: npm run build
        env:
          # No Apple certificate on the runner — skip code signing so the
          # build doesn't hang or fail trying to sign. App stays unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Attendance-Manager-Mac
          path: dist/*.zip
          retention-days: 30

      # Only runs when a version tag (v*) is pushed: publishes a public Release
      # with the Mac .zip attached (the Windows job appends its .exe afterward).
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            ## Attendance Manager

            ### Mac
            **Apple Silicon Macs (M1/M2/M3/M4):** download **`-arm64-mac.zip`**.
            *(Older Intel Macs: download `-mac.zip`.)*
            1. Double-click the `.zip` → **Attendance Manager.app** → drag into **Applications**.
            2. First open: if blocked,  → **System Settings → Privacy & Security** → **Open Anyway**.

            ### Windows
            Download the **`.exe`** installer and run it.
            *(If Windows shows a blue "protected your PC" box: **More info → Run anyway**.)*

  build-win:
    name: Build Windows app
    needs: build          # run after the Mac job so the Release already exists
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run build:win

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Attendance-Manager-Windows
          path: dist/*.exe
          retention-days: 30

      - name: Attach Windows installer to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
