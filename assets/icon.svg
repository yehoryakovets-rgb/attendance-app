<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0f9b9b"/>
  <!-- serif "A" built from strokes (font-independent so it renders identically everywhere) -->
  <g fill="none" stroke="#ffffff" stroke-width="48" stroke-linejoin="miter" stroke-miterlimit="8">
    <path d="M150 392 L256 120 L362 392"/>
    <path d="M198 300 L314 300" stroke-width="40"/>
  </g>
  <!-- slab serif feet (drawn over the leg ends to give clean serifs) -->
  <g fill="#ffffff">
    <rect x="110" y="372" width="96" height="30" rx="6"/>
    <rect x="306" y="372" width="96" height="30" rx="6"/>
  </g>
</svg>
